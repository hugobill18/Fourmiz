plugins {
    id 'java'
}

// No external repositories needed — JUnit 4 is resolved from local Gradle lib files

sourceSets {
    main {
        java {
            srcDirs = ['src']
            exclude 'test/**'
        }
    }
    test {
        java {
            srcDirs = ['src/test/java']
        }
        resources {
            srcDirs = ['src/test/resources']
        }
    }
}

dependencies {
    testImplementation files('/opt/gradle-8.14.3/lib/junit-4.13.2.jar')
    testImplementation files('/opt/gradle-8.14.3/lib/hamcrest-core-1.3.jar')
}

test {
    useJUnit()
    // Ensure working directory is project root so terrain.dat resolves correctly
    workingDir = projectDir
}
